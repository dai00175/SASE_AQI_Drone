name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/aqi-bridge

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/aqi-bridge/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio ruff httpx

      - name: Lint with ruff
        run: ruff check aqi_bridge/ tests/

      - name: Run test suite
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t sase-aqi-bridge:ci apps/aqi-bridge/
